<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mesh2urdf</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="viewport-container"></div>
    <div id="sidebar">
      <h2>mesh2urdf</h2>

      <section id="upload-section">
        <h3>Load Mesh</h3>
        <input type="file" id="mesh-file-input" accept=".stl,.obj">
        <button id="upload-btn" class="btn-primary">Upload</button>
        <div id="upload-status"></div>
      </section>

      <section id="links-section">
        <h3>Links</h3>
        <div id="links-list"><p class="empty-hint">Upload a mesh to get started</p></div>
      </section>

      <section id="joints-section">
        <h3>Joints</h3>
        <div id="joints-list"><p class="empty-hint">Add links first</p></div>

        <details id="add-joint-form" style="margin-top:8px">
          <summary class="add-joint-summary">+ Add Joint</summary>
          <div class="joint-form-inner">
            <label class="joint-form-label">Name
              <input type="text" id="joint-name" placeholder="joint_1">
            </label>
            <label class="joint-form-label">Type
              <select id="joint-type">
                <option value="fixed">Fixed</option>
                <option value="revolute">Revolute</option>
                <option value="prismatic">Prismatic</option>
                <option value="continuous">Continuous</option>
              </select>
            </label>
            <label class="joint-form-label">Parent link
              <select id="joint-parent"><option value="">-- select --</option></select>
            </label>
            <label class="joint-form-label">Child link
              <select id="joint-child"><option value="">-- select --</option></select>
            </label>
            <div id="joint-axis-row" class="joint-axis-row" style="display:none">
              <label class="joint-form-label">Axis</label>
              <div class="joint-axis-inputs">
                <label class="joint-form-label">X<input type="number" id="axis-x" value="0" step="0.1"></label>
                <label class="joint-form-label">Y<input type="number" id="axis-y" value="0" step="0.1"></label>
                <label class="joint-form-label">Z<input type="number" id="axis-z" value="1" step="0.1"></label>
              </div>
            </div>
            <button id="add-joint-btn" class="btn-primary">Add Joint</button>
          </div>
        </details>
      </section>

      <section id="export-section">
        <button id="export-btn" class="btn-primary" disabled>Export URDF</button>
      </section>
    </div>
  </div>
  <div id="toast-container"></div>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
